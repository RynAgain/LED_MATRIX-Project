{% extends "base.html" %}
{% block title %}Countdown - LED Matrix Control{% endblock %}
{% block content %}
<h1>Countdown Timer</h1>

<div class="card">
    <h2>Set Timer</h2>
    <form method="POST" action="{{ url_for('countdown_page') }}">
        <div class="form-group">
            <label for="label">Timer Label</label>
            <input type="text" id="label" name="label" value="{{ config.get('label', 'Timer') }}" maxlength="10">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="hours">Hours</label>
                <input type="number" id="hours" name="hours" value="0" min="0" max="99">
            </div>
            <div class="form-group">
                <label for="minutes">Minutes</label>
                <input type="number" id="minutes" name="minutes" value="5" min="0" max="59">
            </div>
            <div class="form-group">
                <label for="secs">Seconds</label>
                <input type="number" id="secs" name="secs" value="0" min="0" max="59">
            </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Start Countdown</button>
    </form>
</div>

<div class="card">
    <h2>Quick Timers</h2>
    <div class="action-grid">
        <button class="btn btn-info" onclick="quickTimer(60, '1 Min')">1 Min</button>
        <button class="btn btn-info" onclick="quickTimer(300, '5 Min')">5 Min</button>
        <button class="btn btn-info" onclick="quickTimer(600, '10 Min')">10 Min</button>
        <button class="btn btn-warning" onclick="quickTimer(1800, '30 Min')">30 Min</button>
    </div>
</div>

<script>
function quickTimer(seconds, label) {
    fetch('{{ url_for("api_countdown") }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({seconds: seconds, label: label})
    })
    .then(r => r.json())
    .then(d => {
        if (d.success) {
            document.querySelector('.container').insertAdjacentHTML('afterbegin',
                '<div class="alert alert-success">' + label + ' countdown started!</div>');
        }
    });
}
</script>
{% endblock %}
