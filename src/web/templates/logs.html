{% extends "base.html" %}
{% block title %}Logs - LED Matrix{% endblock %}
{% block content %}
<h1>System Logs</h1>

<div class="card">
    <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 15px;">
        <label for="logFile" style="font-weight: bold;">Log file:</label>
        <select id="logFile" onchange="loadLogs()" style="padding: 6px 10px; border-radius: 4px; border: 1px solid #444; background: #2a2a2a; color: #eee;">
            <option value="display" selected>Display (main)</option>
            <option value="updater">Updater</option>
        </select>

        <label for="logFilter" style="font-weight: bold; margin-left: 10px;">Filter:</label>
        <input type="text" id="logFilter" placeholder="e.g. youtube, error, download..."
               style="padding: 6px 10px; border-radius: 4px; border: 1px solid #444; background: #2a2a2a; color: #eee; width: 200px;"
               oninput="debounceLoad()">

        <label for="logLines" style="font-weight: bold; margin-left: 10px;">Lines:</label>
        <select id="logLines" onchange="loadLogs()" style="padding: 6px 10px; border-radius: 4px; border: 1px solid #444; background: #2a2a2a; color: #eee;">
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="200" selected>200</option>
            <option value="500">500</option>
            <option value="1000">1000</option>
        </select>

        <button onclick="loadLogs()" style="padding: 6px 14px; border-radius: 4px; border: none; background: #0066cc; color: white; cursor: pointer; margin-left: 10px;">
            Refresh
        </button>

        <label style="margin-left: 10px; display: flex; align-items: center; gap: 5px;">
            <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()">
            Auto-refresh (5s)
        </label>
    </div>

    <div id="logStatus" style="color: #888; font-size: 0.85em; margin-bottom: 8px;"></div>

    <div id="logContainer" style="background: #111; border: 1px solid #333; border-radius: 4px; padding: 10px; max-height: 70vh; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-all;">
        Loading...
    </div>
</div>

<style>
    .log-line { padding: 1px 0; }
    .log-error { color: #ff6b6b; }
    .log-warning { color: #ffd93d; }
    .log-info { color: #ccc; }
    .log-debug { color: #666; }
    .log-highlight { background: rgba(255, 255, 0, 0.15); }
</style>

<script>
let autoRefreshTimer = null;
let debounceTimer = null;

function debounceLoad() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(loadLogs, 400);
}

function classifyLine(line) {
    const lower = line.toLowerCase();
    if (lower.includes('[error]') || lower.includes('error:') || lower.includes('failed') || lower.includes('traceback')) {
        return 'log-error';
    }
    if (lower.includes('[warn') || lower.includes('warning')) {
        return 'log-warning';
    }
    if (lower.includes('[debug]')) {
        return 'log-debug';
    }
    return 'log-info';
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function loadLogs() {
    const file = document.getElementById('logFile').value;
    const lines = document.getElementById('logLines').value;
    const filter = document.getElementById('logFilter').value;
    const container = document.getElementById('logContainer');
    const status = document.getElementById('logStatus');

    let url = `/api/logs?file=${file}&lines=${lines}`;
    if (filter) {
        url += `&filter=${encodeURIComponent(filter)}`;
    }

    fetch(url)
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                container.innerHTML = `<span class="log-error">Error: ${escapeHtml(data.error)}</span>`;
                status.textContent = '';
                return;
            }

            if (data.lines.length === 0) {
                container.innerHTML = '<span class="log-info">No log entries found.</span>';
                status.textContent = `${data.file}.log -- ${data.total_lines || 0} total lines`;
                return;
            }

            const filterLower = filter.toLowerCase();
            const html = data.lines.map(line => {
                const cls = classifyLine(line);
                let escaped = escapeHtml(line);

                // Highlight filter matches
                if (filterLower && escaped.toLowerCase().includes(filterLower)) {
                    const regex = new RegExp(`(${filterLower.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                    escaped = escaped.replace(regex, '<mark>$1</mark>');
                }

                return `<div class="log-line ${cls}">${escaped}</div>`;
            }).join('');

            container.innerHTML = html;
            status.textContent = `${data.file}.log -- showing ${data.showing} of ${data.total_lines} lines`;

            // Auto-scroll to bottom
            container.scrollTop = container.scrollHeight;
        })
        .catch(err => {
            container.innerHTML = `<span class="log-error">Failed to load logs: ${escapeHtml(err.toString())}</span>`;
        });
}

function toggleAutoRefresh() {
    const checked = document.getElementById('autoRefresh').checked;
    if (checked) {
        autoRefreshTimer = setInterval(loadLogs, 5000);
    } else {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
    }
}

// Load on page open
loadLogs();
</script>
{% endblock %}
