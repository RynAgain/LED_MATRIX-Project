{% extends "base.html" %}
{% block title %}Logs - LED Matrix{% endblock %}
{% block content %}
<h1>System Logs</h1>

<div class="card">
    <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 15px;">
        <label for="logFile" style="font-weight: bold;">Log file:</label>
        <select id="logFile" onchange="loadLogs()" style="padding: 6px 10px; border-radius: 4px; border: 1px solid #444; background: #2a2a2a; color: #eee;">
            <option value="display" selected>Display (main)</option>
            <option value="updater">Updater</option>
        </select>

        <label for="logFilter" style="font-weight: bold; margin-left: 10px;">Filter:</label>
        <input type="text" id="logFilter" placeholder="e.g. youtube, error, download..."
               style="padding: 6px 10px; border-radius: 4px; border: 1px solid #444; background: #2a2a2a; color: #eee; width: 200px;"
               oninput="debounceLoad()">

        <label for="logLines" style="font-weight: bold; margin-left: 10px;">Lines:</label>
        <select id="logLines" onchange="loadLogs()" style="padding: 6px 10px; border-radius: 4px; border: 1px solid #444; background: #2a2a2a; color: #eee;">
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="200" selected>200</option>
            <option value="500">500</option>
            <option value="1000">1000</option>
        </select>

        <button onclick="loadLogs()" style="padding: 6px 14px; border-radius: 4px; border: none; background: #0066cc; color: white; cursor: pointer; margin-left: 10px;">
            Refresh
        </button>

        <button onclick="clearLogs()" style="padding: 6px 14px; border-radius: 4px; border: none; background: #cc3333; color: white; cursor: pointer;">
            Clear
        </button>
    </div>

    <!-- Level filter buttons -->
    <div style="display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;">
        <button class="level-btn active" data-level="ALL" onclick="setLevelFilter('ALL', this)" style="padding: 4px 12px; border-radius: 4px; border: 1px solid #555; background: #444; color: #eee; cursor: pointer; font-size: 0.85em;">ALL</button>
        <button class="level-btn" data-level="ERROR" onclick="setLevelFilter('ERROR', this)" style="padding: 4px 12px; border-radius: 4px; border: 1px solid #555; background: transparent; color: #ff6b6b; cursor: pointer; font-size: 0.85em;">ERROR</button>
        <button class="level-btn" data-level="WARNING" onclick="setLevelFilter('WARNING', this)" style="padding: 4px 12px; border-radius: 4px; border: 1px solid #555; background: transparent; color: #ffd93d; cursor: pointer; font-size: 0.85em;">WARNING</button>
        <button class="level-btn" data-level="INFO" onclick="setLevelFilter('INFO', this)" style="padding: 4px 12px; border-radius: 4px; border: 1px solid #555; background: transparent; color: #ccc; cursor: pointer; font-size: 0.85em;">INFO</button>
        <button class="level-btn" data-level="DEBUG" onclick="setLevelFilter('DEBUG', this)" style="padding: 4px 12px; border-radius: 4px; border: 1px solid #555; background: transparent; color: #666; cursor: pointer; font-size: 0.85em;">DEBUG</button>
    </div>

    <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 8px;">
        <label style="display: flex; align-items: center; gap: 5px;">
            <input type="checkbox" id="autoRefresh" checked onchange="toggleAutoRefresh()">
            Auto-refresh (5s)
        </label>
        <label style="display: flex; align-items: center; gap: 5px;">
            <input type="checkbox" id="autoScroll" checked>
            Follow (auto-scroll)
        </label>
    </div>

    <div id="logStatus" style="color: #888; font-size: 0.85em; margin-bottom: 8px;"></div>

    <div id="logContainer" style="background: #111; border: 1px solid #333; border-radius: 4px; padding: 10px; max-height: 70vh; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-all;">
        Loading...
    </div>
</div>

<style>
    .log-line { padding: 1px 0; }
    .log-error { color: #ff6b6b; }
    .log-warning { color: #ffd93d; }
    .log-info { color: #ccc; }
    .log-debug { color: #666; }
    .log-highlight { background: rgba(255, 255, 0, 0.15); }
    .level-btn.active { background: #444 !important; font-weight: bold; }
</style>

<script>
let autoRefreshTimer = null;
let debounceTimer = null;
let currentLevelFilter = 'ALL';

function debounceLoad() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(loadLogs, 400);
}

function classifyLine(line) {
    const lower = line.toLowerCase();
    if (lower.includes('[error]') || lower.includes('error:') || lower.includes('failed') || lower.includes('traceback')) {
        return 'log-error';
    }
    if (lower.includes('[warn') || lower.includes('warning')) {
        return 'log-warning';
    }
    if (lower.includes('[debug]')) {
        return 'log-debug';
    }
    return 'log-info';
}

function getLevelFromClass(cls) {
    if (cls === 'log-error') return 'ERROR';
    if (cls === 'log-warning') return 'WARNING';
    if (cls === 'log-debug') return 'DEBUG';
    return 'INFO';
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function setLevelFilter(level, btn) {
    currentLevelFilter = level;
    // Update button styles
    var buttons = document.querySelectorAll('.level-btn');
    for (var i = 0; i < buttons.length; i++) {
        buttons[i].classList.remove('active');
        buttons[i].style.background = 'transparent';
    }
    btn.classList.add('active');
    btn.style.background = '#444';
    // Apply filter to existing lines
    applyLevelFilter();
}

function applyLevelFilter() {
    var lines = document.querySelectorAll('#logContainer .log-line');
    for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (currentLevelFilter === 'ALL') {
            line.style.display = '';
        } else {
            var lineLevel = line.getAttribute('data-level');
            line.style.display = (lineLevel === currentLevelFilter) ? '' : 'none';
        }
    }
}

function loadLogs() {
    const file = document.getElementById('logFile').value;
    const lines = document.getElementById('logLines').value;
    const filter = document.getElementById('logFilter').value;
    const container = document.getElementById('logContainer');
    const status = document.getElementById('logStatus');

    let url = `/api/logs?file=${file}&lines=${lines}`;
    if (filter) {
        url += `&filter=${encodeURIComponent(filter)}`;
    }

    fetch(url)
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                container.innerHTML = `<span class="log-error">Error: ${escapeHtml(data.error)}</span>`;
                status.textContent = '';
                return;
            }

            if (data.lines.length === 0) {
                container.innerHTML = '<span class="log-info">No log entries found.</span>';
                status.textContent = `${data.file}.log -- ${data.total_lines || 0} total lines`;
                return;
            }

            const filterLower = filter.toLowerCase();
            const html = data.lines.map(line => {
                const cls = classifyLine(line);
                const level = getLevelFromClass(cls);
                let escaped = escapeHtml(line);

                // Highlight filter matches
                if (filterLower && escaped.toLowerCase().includes(filterLower)) {
                    const regex = new RegExp(`(${filterLower.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                    escaped = escaped.replace(regex, '<mark>$1</mark>');
                }

                // Apply current level filter visibility
                const display = (currentLevelFilter === 'ALL' || level === currentLevelFilter) ? '' : 'display:none;';

                return `<div class="log-line ${cls}" data-level="${level}" style="${display}">${escaped}</div>`;
            }).join('');

            container.innerHTML = html;
            status.textContent = `${data.file}.log -- showing ${data.showing} of ${data.total_lines} lines`;

            // Auto-scroll to bottom if Follow is enabled
            if (document.getElementById('autoScroll').checked) {
                container.scrollTop = container.scrollHeight;
            }
        })
        .catch(err => {
            container.innerHTML = `<span class="log-error">Failed to load logs: ${escapeHtml(err.toString())}</span>`;
        });
}

function toggleAutoRefresh() {
    const checked = document.getElementById('autoRefresh').checked;
    if (checked) {
        autoRefreshTimer = setInterval(loadLogs, 5000);
    } else {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
    }
}

function clearLogs() {
    if (!confirm('Clear the display log file? This cannot be undone.')) return;
    fetch('/api/clear-logs', {method: 'POST', headers: {'Content-Type': 'application/json'}})
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d.success) {
                loadLogs();
            } else {
                alert('Failed to clear logs: ' + (d.error || 'Unknown error'));
            }
        })
        .catch(function(e) { alert('Error: ' + e); });
}

// Load on page open and start auto-refresh by default
loadLogs();
autoRefreshTimer = setInterval(loadLogs, 5000);
</script>
{% endblock %}
