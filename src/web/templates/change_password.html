{% extends "base.html" %}
{% block title %}Change Password - LED Matrix Control{% endblock %}
{% block content %}
<h1>Change Password</h1>

<div class="card">
    <form method="POST" action="{{ url_for('change_password') }}">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="current_password">Current Password</label>
            <input type="password" id="current_password" name="current_password" required autocomplete="current-password">
        </div>
        <div class="form-group">
            <label for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password" required minlength="4" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm New Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Change Password</button>
    </form>
</div>
{% endblock %}
