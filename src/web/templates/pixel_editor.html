{% extends "base.html" %}
{% block title %}Pixel Art - LED Matrix Control{% endblock %}
{% block content %}
<h1>Pixel Art Editor</h1>

<div class="card">
    <div style="text-align: center;">
        <canvas id="pixel-canvas" width="320" height="320" 
                style="border: 1px solid var(--border-color); cursor: crosshair; touch-action: none; image-rendering: pixelated;"></canvas>
    </div>
    <div style="margin-top: 0.75rem;">
        <label style="color: var(--text-secondary); font-size: 0.85rem;">Color:</label>
        <input type="color" id="draw-color" value="#00ff00" style="vertical-align: middle;">
        <button class="btn btn-danger btn-small" onclick="clearCanvas()" style="margin-left: 0.5rem;">Clear</button>
        <button class="btn btn-primary btn-small" onclick="sendToMatrix()" style="margin-left: 0.5rem;">Send to Matrix</button>
        <button class="btn btn-info btn-small" onclick="saveImage()" style="margin-left: 0.5rem;">Save</button>
    </div>
</div>

<script>
var canvas = document.getElementById('pixel-canvas');
var ctx = canvas.getContext('2d');
var GRID = 64;
var CELL = canvas.width / GRID;
var pixels = [];
var drawing = false;

// Init grid
for (var y = 0; y < GRID; y++) {
    pixels[y] = [];
    for (var x = 0; x < GRID; x++) {
        pixels[y][x] = [0, 0, 0];
    }
}

function drawGrid() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    for (var y = 0; y < GRID; y++) {
        for (var x = 0; x < GRID; x++) {
            var c = pixels[y][x];
            if (c[0] || c[1] || c[2]) {
                ctx.fillStyle = 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')';
                ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
            }
        }
    }
    // Grid lines
    ctx.strokeStyle = 'rgba(50,50,70,0.3)';
    ctx.lineWidth = 0.5;
    for (var i = 0; i <= GRID; i++) {
        ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(canvas.width, i * CELL); ctx.stroke();
    }
}

function getPixelPos(e) {
    var rect = canvas.getBoundingClientRect();
    var touch = e.touches ? e.touches[0] : e;
    var x = Math.floor((touch.clientX - rect.left) / CELL);
    var y = Math.floor((touch.clientY - rect.top) / CELL);
    return [Math.max(0, Math.min(GRID-1, x)), Math.max(0, Math.min(GRID-1, y))];
}

function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return [r, g, b];
}

function setPixel(e) {
    var pos = getPixelPos(e);
    var color = hexToRgb(document.getElementById('draw-color').value);
    pixels[pos[1]][pos[0]] = color;
    drawGrid();
}

canvas.addEventListener('mousedown', function(e) { drawing = true; setPixel(e); });
canvas.addEventListener('mousemove', function(e) { if (drawing) setPixel(e); });
canvas.addEventListener('mouseup', function() { drawing = false; });
canvas.addEventListener('touchstart', function(e) { e.preventDefault(); setPixel(e); });
canvas.addEventListener('touchmove', function(e) { e.preventDefault(); setPixel(e); });

function clearCanvas() {
    for (var y = 0; y < GRID; y++)
        for (var x = 0; x < GRID; x++)
            pixels[y][x] = [0, 0, 0];
    drawGrid();
}

function sendToMatrix() {
    fetch('{{ url_for("api_pixel_art") }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest'},
        body: JSON.stringify({pixels: pixels})
    })
    .then(r => r.json())
    .then(d => {
        if (d.success) {
            document.querySelector('.container').insertAdjacentHTML('afterbegin',
                '<div class="alert alert-success">Sent to matrix!</div>');
        }
    });
}

function saveImage() {
    fetch('{{ url_for("api_save_pixel_art") }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest'},
        body: JSON.stringify({pixels: pixels})
    })
    .then(r => r.json())
    .then(d => {
        if (d.success) {
            document.querySelector('.container').insertAdjacentHTML('afterbegin',
                '<div class="alert alert-success">Saved as ' + escapeHtml(d.filename) + '</div>');
        }
    });
}

drawGrid();
</script>
{% endblock %}
